# Railway — New Project → Deploy from GitHub, set root directory to repo root.
# Settings → Build: Dockerfile path `server/Dockerfile`, or use Railpack with start command from /server.

[build]
builder = "DOCKERFILE"
dockerfilePath = "server/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
