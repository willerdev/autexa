# Render Blueprint — Dashboard: New → Blueprint → connect repo willerdev/autexa
# Or: New → Web Service → Docker, Dockerfile path server/Dockerfile, context server
# After first deploy, set PUBLIC_API_BASE_URL to your Render URL (e.g. https://autexa-api.onrender.com).
# Mark all sync:false values as Secret in the Render UI.

services:
  - type: web
    name: autexa-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8787"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: PUBLIC_API_BASE_URL
        sync: false
      # Flutterwave v4 (wallet + booking) — see server/.env.example
      - key: FLUTTERWAVE_CLIENT_ID
        sync: false
      - key: FLUTTERWAVE_CLIENT_SECRET
        sync: false
      - key: FLUTTERWAVE_SANDBOX
        sync: false
      - key: FLUTTERWAVE_SECRET_HASH
        sync: false
      - key: FLUTTERWAVE_BOOKING_USD_TO_UGX
        value: "3850"
      - key: FLUTTERWAVE_WEBHOOK_SKIP_VERIFY
        sync: false
      # Optional
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_SMS_ENABLED
        sync: false
      # Legacy Stripe (disabled unless STRIPE_WEBHOOK_ENABLED=1)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_ENABLED
        sync: false
